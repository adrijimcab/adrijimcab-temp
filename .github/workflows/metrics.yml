name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}

concurrency:
  group: metrics-update
  cancel-in-progress: true

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: God-Mode Dashboard
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: adrijimcab
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Madrid
          
          # Restauramos el Radar de Actividad de 4 ejes
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_activity_charts: yes
          
          # Hábitos y patrones
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_facts: yes
          
          # Calendario 3D
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          # Logros (REPARADO: sin restricciones de nivel para evitar errores)
          plugin_achievements: yes
          plugin_achievements_display: detailed
          
          # Lenguajes
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes, percentage
          
          # Seguimiento
          plugin_followup: yes
          plugin_followup_sections: repositories, user
          
          filename: github-metrics.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore: repair dashboard components [skip ci]"
