name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: adrijimcab
          template: classic
          base: header, sections
          filename: github-metrics.svg
          # IMPORTANTE: Guardamos en el repo actual en la carpeta metrics
          output_action: commit
          committer_branch: main
          committer_message: "chore: update metrics radar"
