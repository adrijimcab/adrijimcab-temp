name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}

# Eliminamos la concurrencia para evitar el estado "Cancelled" y que todo se ejecute hasta el final
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: God-Mode Dashboard
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: adrijimcab
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Madrid
          
          # 1. Activity & Pulse (Ampliado para mayor visibilidad)
          plugin_activity: yes
          plugin_activity_limit: 8
          plugin_activity_days: 30
          plugin_activity_filter: all
          
          # 2. Languages & Technical DNA (Radar + Statistics)
          # Solución al error TypeError: Ajustamos los parámetros de carga y filtrado
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: bytes, percentage, lines
          plugin_languages_limit: 8
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 500
          plugin_languages_sections: most-used, recently-used
          
          # 3. Followup & Engagement
          plugin_followup: yes
          plugin_followup_sections: repositories, user
          
          # 4. Habits & Patterns
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          
          # 5. Achievements & Milestones
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          
          # 6. Global Activity Visualization
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          # Layout & Style (Optimizado)
          config_order: base.header, isocalendar, languages, activity, habits, followup, achievements
          config_padding: 0, 8 + 10%
          
          filename: github-metrics.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore: update metrics dashboard [skip ci]"
